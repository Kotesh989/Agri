name: Deploy Backend to Render

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_DEPLOY_KEY: ${{ secrets.RENDER_DEPLOY_KEY }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail

          if [ -n "$RENDER_BACKEND_DEPLOY_HOOK_URL" ]; then
            curl --fail --show-error --silent "$RENDER_BACKEND_DEPLOY_HOOK_URL"
            exit 0
          fi

          deploy_key="${RENDER_DEPLOY_KEY:-$RENDER_API_KEY}"
          service_id="$RENDER_SERVICE_ID"
          if [ -n "$service_id" ] && [ -n "$deploy_key" ]; then
            case "$service_id" in
              srv-*) render_service_id="$service_id" ;;
              *) render_service_id="srv-$service_id" ;;
            esac
            curl --fail --show-error --silent "https://api.render.com/deploy/${render_service_id}?key=${deploy_key}"
            exit 0
          fi

          echo "Missing Render backend deploy secrets."
          echo "Set RENDER_BACKEND_DEPLOY_HOOK_URL, or set RENDER_SERVICE_ID and RENDER_DEPLOY_KEY."
          exit 1
