services:
  - type: web
    name: agri-fertilizer-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm ci --omit=dev
    startCommand: cd backend && npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_SEED_ON_START
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMS_WEBHOOK_URL
        sync: false
      - key: SMS_WEBHOOK_TOKEN
        sync: false

  - type: web
    name: agri-fertilizer-web
    runtime: static
    buildCommand: cd frontend && npm ci --include=dev && npm run build
    staticPublishPath: frontend/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_APP_NAME
        value: Agri Fertilizer Shop
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
